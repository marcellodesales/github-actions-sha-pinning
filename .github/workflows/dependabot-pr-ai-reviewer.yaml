name: 🧠 Dependabot PR Reviewer

run-name: "🧠 Dependabot PR Reviewer for #${{ github.event.pull_request.number }}"

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read
  checks: read
  statuses: read

concurrency:
  group: dependabot-pr-reviewer-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dependabot-review:
    name: 🤖 Review Dependabot PR
    if: github.event.pull_request.user.login == 'dependabot[bot]' || github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Review Dependabot PR with Anthropic
        uses: vionix-platform/actions/github/dependabot/reviewer-anthropic@main
        with:
          github-token: ${{ github.token }}

          # Anthropic credentials/config
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          anthropic-base-url: ${{ vars.ANTHROPIC_BASE_URL || 'https://api.anthropic.com' }}
          anthropic-version: "2023-06-01"
          anthropic-models: "claude-opus-4-6,claude-sonnet-4-6,claude-haiku-4-5"
          anthropic-max-tokens: "1200"
          anthropic-temperature: "0.2"
          anthropic-request-timeout-seconds: "120"

          # Retry behavior
          max-attempts-per-model: "5"
          initial-retry-sleep-seconds: "3"
          fail-on-anthropic-error: "false"

          # Dependabot prompt sizing
          pr-body-max-chars: "8000"
          dependency-names-max-chars: "4000"

          # Reviewer behavior
          require-dependabot: "true"
          include-ci-signal: "true"
          publish-summary: "true"
          post-comment: "true"
          update-existing-comment: "true"

          # PR comment/review formatting
          review-title: "## 🤖 Dependabot Dependency Review"
          comment-marker: "## 🤖 Dependabot Dependency Review"

          # Optional repo-specific guidance appended to the Anthropic prompt
          extra-prompt: |
            Prefer MERGE only when the dependency update appears low-risk and CI/checks are passing.
            Use HOLD when CI is failing or the update includes major runtime, framework, compiler, SDK, Docker, Kubernetes, or security-tooling changes.
            Use INVESTIGATE when repository-specific runtime usage cannot be determined from the Dependabot metadata and PR body alone.
